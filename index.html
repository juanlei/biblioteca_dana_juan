<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biblioteca_dana_juan | Cargando...</title>
</head>
<body>
    <script>
        fetch('libros.xml')
            .then(response => response.text())
            .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
            .then(xml => {
                const xslPromise = fetch('estilo.xsl').then(response => response.text());
                return Promise.all([xml, xslPromise]);
            })
            .then(([xml, xslStr]) => {
                const xsl = new window.DOMParser().parseFromString(xslStr, "text/xml");
                const xsltProcessor = new XSLTProcessor();
                xsltProcessor.importStylesheet(xsl);
                const resultDocument = xsltProcessor.transformToFragment(xml, document);
                document.body.innerHTML = ''; // Limpiar cuerpo
                document.body.appendChild(resultDocument);
            });
    </script>
</body>
</html>
