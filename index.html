<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada | Biblioteca Dana & Juan</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            /* Fondo de biblioteca elegante oscurecido */
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }

        .tarjeta-bienvenida {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            backdrop-filter: blur(10px);
            border-top: 5px solid #3b82f6;
        }

        .icono-libro {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #0f172a;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
        }

        p {
            color: #475569;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-entrar {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-entrar:hover {
            background-color: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="tarjeta-bienvenida">
        <div class="icono-libro">📚</div>
        <h1>Biblioteca Digital</h1>
        <p>Bienvenido al catálogo interactivo de Dana y Juan. Explora nuestra colección literaria y técnica.</p>
        
        <a href="libros.xml" class="btn-entrar">Acceder al Catálogo</a>
    </div>

</body>
</html>
